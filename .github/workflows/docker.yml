name: Create and publish a Docker image

on:
  push:
  workflow_dispatch:

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup JVM
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 25
          cache: sbt
      - name: Install sbt
        uses: sbt/setup-sbt@af116cce31c00823d3903ce687f9cda3a4f19f1b # v1.2.1
      - name: Log in to the Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set Docker labels
        run: |
          if [ "${{ github.ref_name }}" = "${{ github.event.repository.default_branch }}" ]; then
            echo "DOCKER_LABELS=${{ github.sha }},${{ github.ref_name }},latest" >> $GITHUB_ENV
          else
            echo "DOCKER_LABELS=${{ github.sha }},$(echo '${{ github.ref_name }}' | sed 's/[^a-zA-Z0-9_.-]/_/g')" >> $GITHUB_ENV
          fi
      - name: Build and push Docker image
        run: sbt app/Docker/publish
        env:
          VERSION: ${{ github.sha }}

  deploy:
    if: github.repository_owner == 'lichess-org' && github.ref_name == github.event.repository.default_branch
    needs: build-and-push-image
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -s -w "%{http_code}" --fail-with-body -X POST ${{ secrets.DEPLOY_WEBHOOK_URL }}
