name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        command:
          - compile
          - scalafmtCheckAll
          - scalafixAll --check
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: sbt
      - name: Setup sbt
        uses: sbt/setup-sbt@v1
      - run: sbt "${{ matrix.command }}"
