name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version:
          - 25
        command:
          - compile
          - scalafmtCheckAll
          - scalafixAll --check
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: sbt
      - name: Setup sbt
        uses: sbt/setup-sbt@v1
      - run: sbt "${matrix.command}"
